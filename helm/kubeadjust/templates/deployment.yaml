apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeadjust.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeadjust.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "kubeadjust.serviceAccountName" . }}
      {{- with .Values.backend.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: PORT
              value: "{{ .Values.backend.port }}"
          {{- if .Values.backend.allowedOrigins }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.backend.allowedOrigins | quote }}
          {{- end }}
          {{- if .Values.backend.clusters }}
            - name: CLUSTERS
              {{- $parts := list }}
              {{- range $name, $url := .Values.backend.clusters }}
              {{- $parts = append $parts (printf "%s=%s" $name $url) }}
              {{- end }}
              value: {{ join "," $parts | quote }}
          {{- end }}
          {{- with .Values.backend.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.prometheus.enabled }}
            - name: PROMETHEUS_URL
              value: {{ .Values.prometheus.url | quote }}
          {{- end }}
          {{- if .Values.oidc.enabled }}
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: OIDC_REDIRECT_URL
              value: {{ .Values.oidc.redirectUrl | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeadjust.oidcSecretName" . }}
                  key: clientSecret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeadjust.oidcSecretName" . }}
                  key: sessionSecret
            {{- range $name, $_ := .Values.oidc.saTokens }}
            - name: SA_TOKEN_{{ $name | upper | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeadjust.oidcTokenSecretName" $ }}
                  key: {{ $name }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeadjust.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeadjust.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.frontend.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          env:
            - name: BACKEND_URL
              value: {{ printf "http://%s-backend.%s:%v" (include "kubeadjust.fullname" .) .Release.Namespace .Values.backend.port | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
