{{- if .Values.networkPolicy.enabled }}
---
# NetworkPolicy: allow frontend → backend traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeadjust.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeadjust.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: {{ .Values.backend.port }}
  egress:
    # Kubernetes API server (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Prometheus (optional — required for sparklines)
    {{- if .Values.prometheus.enabled }}
    - ports:
        - protocol: TCP
          port: {{ .Values.prometheus.port | default 9090 }}
    {{- end }}
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# NetworkPolicy: allow external ingress → frontend, frontend → backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeadjust.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeadjust.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.frontend.port }}
  egress:
    # Backend
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "kubeadjust.name" . }}
              app.kubernetes.io/component: backend
      ports:
        - protocol: TCP
          port: {{ .Values.backend.port }}
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
