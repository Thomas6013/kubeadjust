# Global
nameOverride: ""
fullnameOverride: ""

# Image registries — set to your registry
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/thomas6013/kubeadjust/kubeadjust-backend
    tag: ""  # defaults to .Chart.AppVersion — set explicitly to pin a specific version
    pullPolicy: Always
    pullSecrets: []
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Restrict CORS to your frontend origin in production.
  # e.g. "https://kubeadjust.example.com"
  allowedOrigins: ""
  # Multi-cluster: map of name → API server URL.
  # Leave empty for single-cluster mode (uses KUBE_API_SERVER).
  # clusters:
  #   prod: "https://k8s.prod.example.com:6443"
  #   staging: "https://k8s.staging.example.com:6443"
  clusters: {}
  # Extra env vars — add overrides here, e.g.:
  # env:
  # - name: KUBE_INSECURE_TLS
  #   value: "true"   # only if your cluster uses a self-signed certificate
  env: []

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/thomas6013/kubeadjust/kubeadjust-frontend
    tag: ""  # defaults to .Chart.AppVersion — set explicitly to pin a specific version
    pullPolicy: Always
    pullSecrets: []
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ServiceAccount used by the backend to proxy k8s API calls
# Note: the actual permissions are granted per-user via their own token.
# This SA only needs minimal rights (the bearer token from the UI carries the real permissions).
serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC — create a ClusterRole + ClusterRoleBinding for demo/admin users
# You can bind this role to specific users/groups manually.
rbac:
  create: true
  # "viewer" creates read-only access to deployments, pods, namespaces, metrics
  # "admin" additionally allows listing all namespaces
  role: viewer

service:
  type: ClusterIP

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: kubeadjust.example.com
  tls: []

# Optional: deploy metrics-server as a sub-chart (disabled by default)
# Enable if your cluster does not already have metrics-server installed.
# See https://github.com/kubernetes-sigs/metrics-server/tree/master/charts/metrics-server
metrics-server:
  enabled: false
  args:
    - --kubelet-insecure-tls

# Optional: OIDC authentication (replaces manual token entry)
# When enabled, users log in via an OIDC provider (e.g. Keycloak, Dex, Google).
# A Service Account token must be configured per cluster (SA_TOKEN / SA_TOKENS).
oidc:
  enabled: false
  issuerUrl: ""        # e.g. https://keycloak.example.com/realms/myrealm
  clientId: ""
  redirectUrl: ""      # e.g. https://kubeadjust.example.com/auth/callback
  # Optional: restrict access to users belonging to at least one of these OIDC groups.
  # Comma-separated list, e.g. "kubeadjust-users,platform-team".
  # Empty = any authenticated user can access (not recommended for production).
  # Requires the OIDC provider to include a "groups" claim in the ID token.
  groups: ""
  # Existing secret for OIDC credentials (clientSecret + sessionSecret).
  # When set, clientSecret and sessionSecret fields below are ignored.
  existingSecret: ""
  # Only used when existingSecret is not set:
  clientSecret: ""     # OIDC client secret — do not put in plain values
  sessionSecret: ""    # session signing key — must be ≥32 chars

  # Existing secret for SA tokens (saToken / saToken-<cluster> keys).
  # When set, saToken and saTokens fields below are ignored.
  existingTokenSecret: ""
  # Only used when existingTokenSecret is not set.
  # SA tokens for named clusters (must match backend.clusters keys).
  # Single-cluster mode uses the pod's in-cluster SA token automatically — no entry needed.
  # saTokens:
  #   prod: "eyJhbG..."
  #   staging: "eyJhbG..."
  saTokens: {}

# Optional: connect to an existing Prometheus for CPU/memory sparklines
prometheus:
  enabled: false
  url: ""    # e.g. http://prometheus-operated.monitoring.svc.cluster.local:9090
  port: 9090 # used for NetworkPolicy egress rule when networkPolicy.enabled=true

# Optional: restrict network traffic between pods (requires a CNI that supports NetworkPolicy)
networkPolicy:
  enabled: false
