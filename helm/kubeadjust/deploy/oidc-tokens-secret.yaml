# KubeAdjust — SA tokens secret
#
# Contains the Service Account tokens used to call the Kubernetes API in OIDC mode.
# Apply manually (or via Sealed Secrets / External Secrets Operator), then reference in values.yaml:
#
#   oidc:
#     enabled: true
#     existingTokenSecret: "kubeadjust-oidc-tokens"
#
# Get a SA token:  kubectl get secret <sa-secret> -n <ns> -o jsonpath='{.data.token}' | base64 -d
# Or project a bound token (recommended):
#   kubectl create token <sa-name> -n <ns> --duration=8760h
#
apiVersion: v1
kind: Secret
metadata:
  name: kubeadjust-oidc-tokens
  namespace: kubeadjust   # adapt to your namespace
type: Opaque
stringData:
  # One key per cluster — names must match backend.clusters keys in values.yaml.
  # Single-cluster mode: no entry needed, the pod's in-cluster SA token is used automatically.
  prod: "eyJhbG..."
  staging: "eyJhbG..."
