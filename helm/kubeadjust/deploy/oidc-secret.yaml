# KubeAdjust — OIDC credentials secret
#
# Contains the OIDC client secret and session signing key.
# Apply manually (or via Sealed Secrets / External Secrets Operator), then reference in values.yaml:
#
#   oidc:
#     enabled: true
#     existingSecret: "kubeadjust-oidc"
#
# Generate sessionSecret:  openssl rand -base64 32
#
apiVersion: v1
kind: Secret
metadata:
  name: kubeadjust-oidc
  namespace: kubeadjust   # adapt to your namespace
type: Opaque
stringData:
  # OIDC client secret (from your provider — Keycloak, Dex, Google, etc.)
  clientSecret: ""

  # Session signing key — must be ≥32 chars, random
  # openssl rand -base64 32
  sessionSecret: ""
