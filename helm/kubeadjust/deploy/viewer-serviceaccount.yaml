# KubeAdjust — viewer ServiceAccount for remote clusters
#
# Apply this manifest on each cluster you want to connect to KubeAdjust:
#
#   kubectl apply -f viewer-serviceaccount.yaml
#
# Then generate a short-lived token:
#
#   kubectl create token kubeadjust-viewer -n kubeadjust --duration=8h
#
# Paste that token in the KubeAdjust login page.
# The token will expire after the specified duration — regenerate as needed.
#
# To make the namespace configurable, replace "kubeadjust" below with your
# preferred namespace before applying.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kubeadjust
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeadjust-viewer
  namespace: kubeadjust
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeadjust-viewer
rules:
  # Core resources
  - apiGroups: [""]
    resources: ["namespaces", "pods", "persistentvolumeclaims", "nodes"]
    verbs: ["get", "list", "watch"]
  # Apps
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Batch (CronJobs + Jobs)
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  # Metrics server (CPU/memory usage — requires metrics-server to be installed)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Kubelet stats/summary proxy (ephemeral storage + volume usage)
  # Best-effort: KubeAdjust degrades gracefully if this is not granted.
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadjust-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeadjust-viewer
subjects:
  - kind: ServiceAccount
    name: kubeadjust-viewer
    namespace: kubeadjust
