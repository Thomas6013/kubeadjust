name: Docker PR Preview

on:
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    name: Build PR image — ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image: kubeadjust-backend
          - context: ./frontend
            image: kubeadjust-frontend

    steps:
      - uses: actions/checkout@v6

      - name: Read owner
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "pr=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64 only for speed)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/kubeadjust/${{ matrix.image }}:${{ steps.meta.outputs.pr }}
            ghcr.io/${{ steps.meta.outputs.owner }}/kubeadjust/${{ matrix.image }}:${{ steps.meta.outputs.pr }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  comment:
    name: Post image tags to PR
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      pull-requests: write

    steps:
      - name: Read owner
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "pr=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = "${{ steps.meta.outputs.owner }}";
            const pr = "${{ steps.meta.outputs.pr }}";
            const sha = "${{ github.sha }}".slice(0, 7);
            const registry = `ghcr.io/${owner}/kubeadjust`;
            const body = [
              `### Docker preview images (amd64)`,
              ``,
              `| Image | Tag |`,
              `|-------|-----|`,
              `| backend  | \`${registry}/kubeadjust-backend:${pr}\` |`,
              `| frontend | \`${registry}/kubeadjust-frontend:${pr}\` |`,
              ``,
              `Pinned to commit \`${sha}\`:`,
              `\`\`\`yaml`,
              `# values.yaml`,
              `backend:`,
              `  image:`,
              `    repository: ${registry}/kubeadjust-backend`,
              `    tag: "${pr}-${{ github.sha }}"`,
              `frontend:`,
              `  image:`,
              `    repository: ${registry}/kubeadjust-frontend`,
              `    tag: "${pr}-${{ github.sha }}"`,
              `\`\`\``,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes("Docker preview images")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
